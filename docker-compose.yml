x-logging: &x-logging
  logging:
    driver: "json-file"
    options:
      max-file: "5"
      max-size: "10m"

services:

  # -------------------------------------------------------
  # Traefik — reverse proxy / SSL termination
  # -------------------------------------------------------
  traefik:
    image: traefik:2.11
    <<: *x-logging
    container_name: appwrite-traefik
    restart: unless-stopped
    command:
      - --log.level=ERROR
      - --api.insecure=false
      - --providers.file.directory=/storage/config
      - --providers.file.watch=true
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --providers.docker.constraints=Label(`traefik.constraint-label-stack`,`appwrite`)
      - --entrypoints.appwrite_web.address=:80
      - --entrypoints.appwrite_websecure.address=:443
      - --accesslog=false
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - appwrite-config:/storage/config:ro
      - appwrite-certificates:/storage/certificates:ro
    depends_on:
      - appwrite
    networks:
      - gateway
      - appwrite

  # -------------------------------------------------------
  # Appwrite — main API server
  # -------------------------------------------------------
  appwrite:
    image: appwrite/appwrite:1.9.5
    container_name: appwrite
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    labels:
      - "traefik.enable=true"
      - "traefik.constraint-label-stack=appwrite"
      - "traefik.docker.network=appwrite"
      - "traefik.http.services.appwrite_api.loadbalancer.server.port=80"
      # HTTP
      - "traefik.http.routers.appwrite_api_http.entrypoints=appwrite_web"
      - "traefik.http.routers.appwrite_api_http.rule=PathPrefix(`/`)"
      - "traefik.http.routers.appwrite_api_http.service=appwrite_api"
      # HTTPS
      - "traefik.http.routers.appwrite_api_https.entrypoints=appwrite_websecure"
      - "traefik.http.routers.appwrite_api_https.rule=PathPrefix(`/`)"
      - "traefik.http.routers.appwrite_api_https.service=appwrite_api"
      - "traefik.http.routers.appwrite_api_https.tls=true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - appwrite-uploads:/storage/uploads:rw
      - appwrite-cache:/storage/cache:rw
      - appwrite-config:/storage/config:rw
      - appwrite-certificates:/storage/certificates:rw
      - appwrite-functions:/storage/functions:rw
      - appwrite-builds:/storage/builds:rw
    depends_on:
      - mariadb
      - redis
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # -------------------------------------------------------
  # Appwrite Console — web UI
  # -------------------------------------------------------
  appwrite-console:
    image: appwrite/console:8.2.1
    container_name: appwrite-console
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    labels:
      - "traefik.enable=true"
      - "traefik.constraint-label-stack=appwrite"
      - "traefik.docker.network=appwrite"
      - "traefik.http.services.appwrite_console.loadbalancer.server.port=80"
      - "traefik.http.routers.appwrite_console_http.entrypoints=appwrite_web"
      - "traefik.http.routers.appwrite_console_http.rule=PathPrefix(`/console`)"
      - "traefik.http.routers.appwrite_console_http.service=appwrite_console"
      - "traefik.http.routers.appwrite_console_https.entrypoints=appwrite_websecure"
      - "traefik.http.routers.appwrite_console_https.rule=PathPrefix(`/console`)"
      - "traefik.http.routers.appwrite_console_https.service=appwrite_console"
      - "traefik.http.routers.appwrite_console_https.tls=true"

  # -------------------------------------------------------
  # Realtime worker
  # -------------------------------------------------------
  appwrite-realtime:
    image: appwrite/appwrite:1.9.5
    entrypoint: realtime
    container_name: appwrite-realtime
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    labels:
      - "traefik.enable=true"
      - "traefik.constraint-label-stack=appwrite"
      - "traefik.docker.network=appwrite"
      - "traefik.http.services.appwrite_realtime.loadbalancer.server.port=80"
      - "traefik.http.routers.appwrite_realtime_ws.entrypoints=appwrite_web"
      - "traefik.http.routers.appwrite_realtime_ws.rule=PathPrefix(`/v1/realtime`)"
      - "traefik.http.routers.appwrite_realtime_ws.service=appwrite_realtime"
      - "traefik.http.routers.appwrite_realtime_wss.entrypoints=appwrite_websecure"
      - "traefik.http.routers.appwrite_realtime_wss.rule=PathPrefix(`/v1/realtime`)"
      - "traefik.http.routers.appwrite_realtime_wss.service=appwrite_realtime"
      - "traefik.http.routers.appwrite_realtime_wss.tls=true"
    depends_on:
      - mariadb
      - redis
    env_file:
      - .env

  # -------------------------------------------------------
  # Background workers
  # -------------------------------------------------------
  appwrite-worker-audits:
    image: appwrite/appwrite:1.9.5
    entrypoint: worker-audits
    container_name: appwrite-worker-audits
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      - redis
      - mariadb
    env_file:
      - .env

  appwrite-worker-webhooks:
    image: appwrite/appwrite:1.9.5
    entrypoint: worker-webhooks
    container_name: appwrite-worker-webhooks
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      - redis
      - mariadb
    env_file:
      - .env

  appwrite-worker-deletes:
    image: appwrite/appwrite:1.9.5
    entrypoint: worker-deletes
    container_name: appwrite-worker-deletes
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      - redis
      - mariadb
    volumes:
      - appwrite-uploads:/storage/uploads:rw
      - appwrite-cache:/storage/cache:rw
      - appwrite-functions:/storage/functions:rw
      - appwrite-builds:/storage/builds:rw
      - appwrite-certificates:/storage/certificates:rw
    env_file:
      - .env

  appwrite-worker-databases:
    image: appwrite/appwrite:1.9.5
    entrypoint: worker-databases
    container_name: appwrite-worker-databases
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      - redis
      - mariadb
    env_file:
      - .env

  appwrite-worker-builds:
    image: appwrite/appwrite:1.9.5
    entrypoint: worker-builds
    container_name: appwrite-worker-builds
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      - redis
      - mariadb
    volumes:
      - appwrite-functions:/storage/functions:rw
      - appwrite-builds:/storage/builds:rw
      - appwrite-uploads:/storage/uploads:rw
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"

  appwrite-worker-certificates:
    image: appwrite/appwrite:1.9.5
    entrypoint: worker-certificates
    container_name: appwrite-worker-certificates
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      - redis
      - mariadb
    volumes:
      - appwrite-config:/storage/config:rw
      - appwrite-certificates:/storage/certificates:rw
    env_file:
      - .env

  appwrite-worker-functions:
    image: appwrite/appwrite:1.9.5
    entrypoint: worker-functions
    container_name: appwrite-worker-functions
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      - redis
      - mariadb
      - openruntimes-executor
    env_file:
      - .env

  appwrite-worker-mails:
    image: appwrite/appwrite:1.9.5
    entrypoint: worker-mails
    container_name: appwrite-worker-mails
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      - redis
    env_file:
      - .env

  appwrite-worker-messaging:
    image: appwrite/appwrite:1.9.5
    entrypoint: worker-messaging
    container_name: appwrite-worker-messaging
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      - redis
    volumes:
      - appwrite-uploads:/storage/uploads:rw
    env_file:
      - .env

  appwrite-worker-migrations:
    image: appwrite/appwrite:1.9.5
    entrypoint: worker-migrations
    container_name: appwrite-worker-migrations
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      - mariadb
    volumes:
      - appwrite-uploads:/storage/uploads:rw
    env_file:
      - .env

  # -------------------------------------------------------
  # Tasks / schedulers
  # -------------------------------------------------------
  appwrite-task-maintenance:
    image: appwrite/appwrite:1.9.5
    entrypoint: maintenance
    container_name: appwrite-task-maintenance
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      - redis
    env_file:
      - .env

  appwrite-task-scheduler-functions:
    image: appwrite/appwrite:1.9.5
    entrypoint: schedule-functions
    container_name: appwrite-task-scheduler-functions
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      - mariadb
      - redis
    env_file:
      - .env

  appwrite-task-scheduler-executions:
    image: appwrite/appwrite:1.9.5
    entrypoint: schedule-executions
    container_name: appwrite-task-scheduler-executions
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      - mariadb
      - redis
    env_file:
      - .env

  appwrite-task-scheduler-messages:
    image: appwrite/appwrite:1.9.5
    entrypoint: schedule-messages
    container_name: appwrite-task-scheduler-messages
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      - mariadb
      - redis
    env_file:
      - .env

  appwrite-worker-stats-resources:
    image: appwrite/appwrite:1.9.5
    entrypoint: worker-stats-resources
    container_name: appwrite-worker-stats-resources
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      - redis
      - mariadb
    env_file:
      - .env

  appwrite-worker-stats-usage:
    image: appwrite/appwrite:1.9.5
    entrypoint: worker-stats-usage
    container_name: appwrite-worker-stats-usage
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      - redis
      - mariadb
    env_file:
      - .env

  # -------------------------------------------------------
  # OpenRuntimes — function execution engine
  # -------------------------------------------------------
  openruntimes-executor:
    image: openruntimes/executor:0.7.1
    container_name: openruntimes-executor
    hostname: exc1
    <<: *x-logging
    restart: unless-stopped
    stop_signal: SIGINT
    networks:
      - appwrite
      - runtimes
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - appwrite-builds:/storage/builds:rw
      - appwrite-functions:/storage/functions:rw
      - /tmp:/tmp:rw
    environment:
      - OPR_EXECUTOR_IMAGE_PULL=enabled
      - OPR_EXECUTOR_INACTIVE_TRESHOLD=${_APP_COMPUTE_INACTIVE_THRESHOLD:-600}
      - OPR_EXECUTOR_MAINTENANCE_INTERVAL=${_APP_COMPUTE_MAINTENANCE_INTERVAL:-3600}
      - OPR_EXECUTOR_NETWORK=${_APP_COMPUTE_RUNTIMES_NETWORK:-runtimes}
      - OPR_EXECUTOR_DOCKER_HUB_USERNAME=${_APP_DOCKER_HUB_USERNAME}
      - OPR_EXECUTOR_DOCKER_HUB_PASSWORD=${_APP_DOCKER_HUB_PASSWORD}
      - OPR_EXECUTOR_ENV=${_APP_ENV:-production}
      - OPR_EXECUTOR_RUNTIMES=${_APP_FUNCTIONS_RUNTIMES:-node-18.0,python-3.9,php-8.0}
      - OPR_EXECUTOR_SECRET=${_APP_EXECUTOR_SECRET}
      - OPR_EXECUTOR_RUNTIME_VERSIONS=v5
      - OPR_EXECUTOR_LOGGING_CONFIG=${_APP_LOGGING_CONFIG}
      - OPR_EXECUTOR_STORAGE_DEVICE=${_APP_STORAGE_DEVICE:-local}

  openruntimes-proxy:
    image: openruntimes/proxy:0.5.0
    container_name: openruntimes-proxy
    hostname: proxy
    <<: *x-logging
    restart: unless-stopped
    stop_signal: SIGINT
    networks:
      - appwrite
      - runtimes
    environment:
      - OPR_PROXY_WORKER_PER_CORE=${_APP_WORKER_PER_CORE:-6}
      - OPR_PROXY_ENV=${_APP_ENV:-production}
      - OPR_PROXY_EXECUTOR_SECRET=${_APP_EXECUTOR_SECRET}
      - OPR_PROXY_SECRET=${_APP_EXECUTOR_SECRET}
      - OPR_PROXY_LOGGING_CONFIG=${_APP_LOGGING_CONFIG}
      - OPR_PROXY_ALGORITHM=random
      - OPR_PROXY_EXECUTORS=exc1
      - OPR_PROXY_HEALTHCHECK_INTERVAL=10000
      - OPR_PROXY_MAX_TIMEOUT=600
      - OPR_PROXY_HEALTHCHECK=enabled

  # -------------------------------------------------------
  # MariaDB — primary database
  # -------------------------------------------------------
  mariadb:
    image: mariadb:10.11
    container_name: appwrite-mariadb
    <<: *x-logging
    restart: unless-stopped
    networks:
      - appwrite
    volumes:
      - appwrite-mariadb:/var/lib/mysql:rw
    environment:
      - MYSQL_ROOT_PASSWORD=${_APP_DB_ROOT_PASS}
      - MYSQL_DATABASE=${_APP_DB_SCHEMA}
      - MYSQL_USER=${_APP_DB_USER}
      - MYSQL_PASSWORD=${_APP_DB_PASS}
      - MARIADB_AUTO_UPGRADE=1
    command: "mysqld --innodb-flush-method=fsync"

  # -------------------------------------------------------
  # Redis — cache / queue
  # -------------------------------------------------------
  redis:
    image: redis:7.2.4-alpine
    container_name: appwrite-redis
    <<: *x-logging
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory            512mb
      --maxmemory-policy     allkeys-lru
      --maxmemory-samples    5
    networks:
      - appwrite
    volumes:
      - appwrite-redis:/data:rw

networks:
  gateway:
    name: gateway
  appwrite:
    name: appwrite
  runtimes:
    name: runtimes

volumes:
  appwrite-mariadb:
  appwrite-redis:
  appwrite-cache:
  appwrite-uploads:
  appwrite-certificates:
  appwrite-functions:
  appwrite-builds:
  appwrite-config: